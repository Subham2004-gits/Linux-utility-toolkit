<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My First Page</title>

  <!-- CSS styling inside <style> -->
  <style>
    body {
      background: linear-gradient(to right, #74ebd5, #ACB6E5); /* gradient background */
      font-family: Arial, sans-serif;
      color: #333;
      text-align: center;
      padding: 50px;
    }

    h1 {
      color: #2c3e50;
      background-color: rgba(255, 255, 255, 0.7);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    }

    p {
      font-size: 18px;
      margin-top: 20px;
      color: #fff;
    }

    button {
      margin-top: 30px;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background-color: #3498db;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #2980b9;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  
  <h1>My name is Subham Padhi</h1>
  <p>Welcome to my first webpage! 🚀</p>

  <button onclick="alert('Hello, Subham! 🎉')">Click Me</button>

</body>
</html>
